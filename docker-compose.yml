services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: sessionops
      POSTGRES_PASSWORD: sessionops
      POSTGRES_DB: sessionops_studio
      POSTGRES_HOST_AUTH_METHOD: trust
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sessionops -d sessionops_studio"]
      interval: 5s
      timeout: 5s
      retries: 5

  migrate:
    build: .
    environment:
      DATABASE_URL: postgresql://sessionops:sessionops@postgres:5432/sessionops_studio
    command: sh -c "npx prisma migrate dev --name init && npx prisma db seed"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - .:/app
      - node_modules_data:/app/node_modules

  app:
    build: .
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgresql://sessionops:sessionops@postgres:5432/sessionops_studio
      NEXTAUTH_SECRET: dev-secret-change-in-production
      NEXTAUTH_URL: http://localhost:3000
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - .:/app
      - node_modules_data:/app/node_modules

volumes:
  postgres_data:
  node_modules_data:
