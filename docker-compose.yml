services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: sessionops
      POSTGRES_PASSWORD: sessionops
      POSTGRES_DB: sessionops_studio
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sessionops -d sessionops_studio"]
      interval: 5s
      timeout: 5s
      retries: 5

  migrate:
    build:
      context: .
      target: runner
    environment:
      DATABASE_URL: postgresql://sessionops:sessionops@postgres:5432/sessionops_studio
      NEXTAUTH_SECRET: dev-secret-change-in-production
      NEXTAUTH_URL: http://localhost:3000
    command: sh -c "npx prisma migrate deploy && npm run db:seed"
    depends_on:
      postgres:
        condition: service_healthy

  app:
    build:
      context: .
      target: runner
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgresql://sessionops:sessionops@postgres:5432/sessionops_studio
      NEXTAUTH_SECRET: dev-secret-change-in-production
      NEXTAUTH_URL: http://localhost:3000
    depends_on:
      migrate:
        condition: service_completed_successfully
    command: ["node", "server.mjs"]

volumes:
  postgres_data:
